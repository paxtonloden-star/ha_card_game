<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HA Card Game</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b1020; }
      iframe { border: 0; width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <iframe id="legacyFrame" title="HA Card Game" referrerpolicy="same-origin"></iframe>
    <script>
      const frame = document.getElementById('legacyFrame');
      const target = new URL('/local/ha_card_game/index.html', window.location.origin);
      target.search = window.location.search;
      target.hash = window.location.hash;
      frame.src = target.toString();



      function markHostEditing(ms = 4000) {
        hostEditing = true;
        hostEditUntil = Date.now() + ms;
      }

      function clearHostEditingSoon(ms = 600) {
        hostEditUntil = Date.now() + ms;
        window.setTimeout(() => {
          if (Date.now() >= hostEditUntil) hostEditing = false;
        }, ms + 50);
      }

      function shouldSkipSync(doc) {
        if (!hostEditing && Date.now() >= hostEditUntil) return false;
        const active = doc?.activeElement;
        if (!active) return false;
        const tag = (active.tagName || '').toLowerCase();
        return tag === 'input' || tag === 'select' || tag === 'textarea';
      }

      function wireHostEditingGuards(doc) {
        if (doc.__hostEditingGuardsApplied) return;
        doc.__hostEditingGuardsApplied = true;

        doc.addEventListener('focusin', (event) => {
          const target = event.target;
          if (!target) return;
          const tag = (target.tagName || '').toLowerCase();
          if (tag === 'input' || tag === 'select' || tag === 'textarea') {
            markHostEditing(8000);
          }
        });

        doc.addEventListener('input', (event) => {
          const target = event.target;
          if (!target) return;
          const tag = (target.tagName || '').toLowerCase();
          if (tag === 'input' || tag === 'select' || tag === 'textarea') {
            markHostEditing(8000);
          }
        });

        doc.addEventListener('change', () => markHostEditing(3000));
        doc.addEventListener('focusout', () => clearHostEditingSoon(800));
      }

      function clearTriviaAutoAdvanceFallback() {
        if (triviaAutoAdvanceTimer) {
          clearTimeout(triviaAutoAdvanceTimer);
          triviaAutoAdvanceTimer = null;
        }
        triviaAutoAdvanceKey = '';
      }

      function scheduleTriviaAutoAdvanceFallback(win) {
        try {
          const state = win?.latestState;
          if (!state || state.game_mode !== 'trivia' || triviaPaused) {
            clearTriviaAutoAdvanceFallback();
            return;
          }
          const trivia = state.trivia || {};
          const revealSeconds = Number(trivia.reveal_seconds || 0);
          const autoCycleEnabled = trivia.auto_cycle_enabled !== false;
          const remaining = Number(trivia.remaining ?? 0);
          const key = [
            state.state || '',
            state.round_number || 0,
            state.winner || '',
            trivia.current_index ?? -1,
            revealSeconds,
            autoCycleEnabled,
            remaining
          ].join('|');

          if (state.state !== 'results' || !autoCycleEnabled || revealSeconds <= 0 || remaining <= 0) {
            clearTriviaAutoAdvanceFallback();
            return;
          }

          if (triviaAutoAdvanceKey === key && triviaAutoAdvanceTimer) return;

          clearTriviaAutoAdvanceFallback();
          triviaAutoAdvanceKey = key;
          triviaAutoAdvanceTimer = setTimeout(async () => {
            try {
              const current = win?.latestState;
              const currentTrivia = current?.trivia || {};
              const currentKey = [
                current?.state || '',
                current?.round_number || 0,
                current?.winner || '',
                currentTrivia.current_index ?? -1,
                Number(currentTrivia.reveal_seconds || 0),
                currentTrivia.auto_cycle_enabled !== false,
                Number(currentTrivia.remaining ?? 0)
              ].join('|');

              if (currentKey !== key) return;
              if (typeof win?.hostAction === 'function') {
                await win.hostAction('start_trivia_round');
                if (typeof win?.fetchState === 'function') {
                  await win.fetchState().catch(() => {});
                }
              }
            } catch (_err) {
            } finally {
              triviaAutoAdvanceTimer = null;
            }
          }, Math.max(500, revealSeconds * 1000 + 250));
        } catch (_err) {
        }
      }

      function tryEnhanceLegacy() {
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        if (!win || !doc || !doc.body) return false;
        wireHostEditingGuards(doc);

        if (win.__cardGamesWrapperEnhancementsApplied) {
          if (win.latestState) {
            try { enhanceUi(win, doc, win.latestState); scheduleTriviaAutoAdvanceFallback(win); } catch (_err) {}
          }
          return true;
        }

        if (typeof win.render !== 'function' || typeof win.hostAction !== 'function') return false;
        win.__cardGamesWrapperEnhancementsApplied = true;

        const style = doc.createElement('style');
        style.textContent = `
          #triviaQuestionPrompt, #playerPromptCard {
            margin-bottom: 12px;
            padding: 16px 18px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            isolation: isolate;
          }
          #triviaQuestionPrompt {
            background: rgba(124,156,255,.10);
            border: 1px solid rgba(124,156,255,.24);
          }
          #playerPromptCard {
            background: #111;
            color: #fff;
            border: 1px solid rgba(255,255,255,.18);
            box-shadow: 0 18px 36px rgba(0,0,0,.28);
          }
          #playerPromptCard::before,
          #triviaQuestionPrompt::before,
          .enhanced-hand-card::before {
            content: 'CARD GAMES';
            position: absolute;
            inset: auto 10px 8px auto;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: .14em;
            opacity: .06;
            pointer-events: none;
            white-space: nowrap;
            transform: rotate(-18deg);
            z-index: -1;
          }
          #playerPromptCard::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,.05), transparent 28%);
            pointer-events: none;
          }
          #playerPromptCard .prompt-label,
          #triviaQuestionPrompt .q-badge {
            flex: 0 0 auto;
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
          }
          #playerPromptCard .prompt-label { color: rgba(255,255,255,.86); }
          #playerPromptCard .prompt-row,
          #triviaQuestionPrompt .q-row { display: flex; gap: 12px; align-items: flex-start; }
          #playerPromptCard .prompt-body,
          #triviaQuestionPrompt .q-body { min-width: 0; flex: 1 1 auto; }
          #playerPromptCard .prompt-text,
          #triviaQuestionPrompt .q-text {
            font-size: 19px;
            font-weight: 800;
            line-height: 1.36;
          }
          #playerPromptCard .prompt-meta {
            margin-top: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .1em;
            opacity: .7;
            font-weight: 800;
          }
          #triviaQuestionPrompt .q-badge { color: #9bb6ff; }
          #triviaQuestionPrompt .q-timer-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
          #triviaQuestionPrompt .q-timer-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; opacity: .7; }
          #triviaQuestionPrompt .q-timer-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 800;
            background: rgba(124,156,255,.18);
            border: 1px solid rgba(124,156,255,.25);
          }
          #triviaQuestionPrompt .q-timer-badge.warning {
            background: rgba(245,158,11,.18);
            border-color: rgba(245,158,11,.35);
            color: #ffd089;
          }
          #triviaQuestionPrompt .q-timer-badge.danger {
            background: rgba(239,68,68,.18);
            border-color: rgba(239,68,68,.35);
            color: #ffb0b0;
          }
          #triviaQuestionPrompt .q-timer-note { font-size: 12px; opacity: .72; }

          #handList.enhanced-card-hand {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            align-items: stretch;
          }
          .enhanced-hand-card {
            position: relative;
            display: flex;
            min-height: 220px;
            padding: 16px;
            border-radius: 18px;
            background: #fff;
            color: #111;
            border: 1px solid rgba(0,0,0,.12);
            box-shadow: 0 12px 28px rgba(0,0,0,.18);
            overflow: hidden;
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
          }
          .enhanced-hand-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(0,0,0,.22);
          }
          .enhanced-hand-card.selected {
            border-color: rgba(67, 97, 238, .65);
            box-shadow: 0 0 0 3px rgba(67,97,238,.12), 0 18px 34px rgba(0,0,0,.22);
          }
          .enhanced-hand-card .card-index {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 26px;
            height: 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            background: rgba(17,17,17,.08);
          }
          .enhanced-hand-card .card-text {
            margin-top: auto;
            white-space: normal;
            font-size: 20px;
            line-height: 1.28;
            font-weight: 700;
          }
          .enhanced-hand-card .card-brand {
            position: absolute;
            left: 14px;
            top: 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .12em;
            opacity: .72;
            font-weight: 800;
          }

          #hostModePanel.card {
            margin-bottom: 16px;
            border: 1px solid rgba(124,156,255,.24);
            background: rgba(124,156,255,.08);
          }
          #hostModePanel .control-grid,
          #hostModePanel .subgrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 12px;
          }
          #hostModePanel .subgrid {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,.08);
          }

          .host-section details {
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 14px;
            background: rgba(10,16,32,.45);
            margin-top: 12px;
            overflow: hidden;
          }
          .host-section summary {
            cursor: pointer;
            list-style: none;
            padding: 14px 16px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
          }
          .host-section summary::-webkit-details-marker { display: none; }
          .host-section .section-body { padding: 0 16px 16px; }
          .host-section[data-hidden="true"] { display: none !important; }

          #hostModePanel[data-mode="trivia"] .cards-only { display: none !important; }
          #hostModePanel[data-mode="cards"] .trivia-only,
          #hostModePanel[data-mode="judge_party"] .trivia-only { display: none !important; }

          #hostControls.trivia-mode #hostSection-access,
          #hostControls.trivia-mode #hostSection-advanced .cards-only,
          #hostControls.cards-mode #hostSection-rounds .trivia-only,
          #hostControls.cards-mode #hostSection-advanced .trivia-only,
          #hostControls.judge-party-mode #hostSection-rounds .trivia-only,
          #hostControls.judge-party-mode #hostSection-advanced .trivia-only {
            display: none !important;
          }

          #hostControls .legacy-trivia-control,
          #hostControls .legacy-trivia-control + div,
          #hostControls .legacy-trivia-control + select,
          #hostControls .legacy-trivia-control + input,
          #hostControls .legacy-trivia-control + label,
          #hostControls.trivia-mode #deckSelect,
          #hostControls.trivia-mode #deckDescription,
          #hostControls.trivia-mode #selectedDeckMode,
          #hostControls.trivia-mode .timer-block,
          #hostControls.trivia-mode .reveal-settings {
            display: none !important;
          }

          #enhancedTriviaCategorySelect { min-height: 140px; }
          #hostModePanel .pill-note { font-size: 12px; opacity: .75; }
          #enhancedTtsTargetsSelect { min-height: 110px; }
          #enhancedTtsNotice { font-size: 12px; opacity: .75; margin-top: 6px; }
          #enhancedTriviaImportJson {
            width: 100%;
            min-height: 190px;
            border-radius: 12px;
          }
          #enhancedTriviaImportNotice {
            min-height: 18px;
          }
        `;
        doc.head.appendChild(style);

        const originalRender = win.render.bind(win);
        win.render = function(state) {
          const result = originalRender(state);
          setTimeout(() => { try { enhanceUi(win, doc, state); scheduleTriviaAutoAdvanceFallback(win); } catch (err) { console.error(err); } }, 0);
          return result;
        };

        const originalBootstrapHost = typeof win.bootstrapHost === 'function' ? win.bootstrapHost.bind(win) : null;
        if (originalBootstrapHost) {
          win.bootstrapHost = async function(...args) {
            const result = await originalBootstrapHost(...args);
            setTimeout(() => { try { enhanceUi(win, doc, win.latestState || null); scheduleTriviaAutoAdvanceFallback(win); } catch (err) { console.error(err); } }, 0);
            return result;
          };
        }

        if (win.latestState) {
          try { enhanceUi(win, doc, win.latestState); } catch (_err) {}
        }
        return true;
      }

      function getTriviaCategoryOptions(win, doc) {
        const map = new Map();
        const select = doc.getElementById('triviaCategorySelect');
        if (select) {
          Array.from(select.options || []).forEach((option) => {
            const value = String(option.value || '').trim();
            if (value) map.set(value, option.textContent || value);
          });
        }
        const customPacks = win.latestState?.trivia?.custom_packs || [];
        customPacks.forEach((pack) => {
          const value = String(pack.slug || '').trim();
          if (value) map.set(value, pack.name || value);
        });
        return Array.from(map.entries()).map(([value, label]) => ({ value, label }));
      }

      function formatTimerValue(totalSeconds, endsAt) {
        if (!totalSeconds || !endsAt) return 'No timer';
        const remaining = Math.max(0, Math.ceil(endsAt - Date.now() / 1000));
        const minutes = Math.floor(remaining / 60);
        const seconds = String(remaining % 60).padStart(2, '0');
        return `${minutes}:${seconds}`;
      }

      function renderQuestionTimer(win, doc, state) {
        const badge = doc.getElementById('triviaQuestionTimerBadge');
        const note = doc.getElementById('triviaQuestionTimerNote');
        if (!badge || !note) return;
        const isTrivia = state?.game_mode === 'trivia';
        const totalSeconds = Number(state?.round_timer_duration || state?.trivia?.answer_seconds || 0);
        const endsAt = Number(state?.round_timer_ends_at || 0);
        badge.style.display = isTrivia ? 'inline-flex' : 'none';
        note.style.display = isTrivia ? '' : 'none';
        if (!isTrivia) return;
        badge.textContent = formatTimerValue(totalSeconds, endsAt);
        const remaining = endsAt ? Math.max(0, Math.ceil(endsAt - Date.now() / 1000)) : 0;
        badge.classList.toggle('warning', remaining <= 15 && remaining > 5);
        badge.classList.toggle('danger', remaining <= 5 && remaining >= 0);
        if (state?.state === 'results') {
          const revealSeconds = Number(state?.trivia?.reveal_seconds || 5);
          note.textContent = `Answer shown now${revealSeconds > 0 ? ` · next question after about ${revealSeconds}s` : ''}`;
        } else if (totalSeconds && endsAt) {
          note.textContent = 'Time remaining to answer';
        } else {
          note.textContent = 'Timer starts when the trivia round begins';
        }
      }

      function ensurePromptCard(win, doc, state) {
        const submitPanel = doc.getElementById('submitPanel');
        const handList = doc.getElementById('handList');
        if (!submitPanel || !handList) return;
        let prompt = doc.getElementById('playerPromptCard');
        if (!prompt) {
          prompt = doc.createElement('div');
          prompt.id = 'playerPromptCard';
          prompt.innerHTML = '<div class="prompt-row"><div class="prompt-label">Q</div><div class="prompt-body"><div class="prompt-text"></div><div class="prompt-meta">Black card</div></div></div>';
          submitPanel.insertBefore(prompt, handList);
        }
        const isCardsMode = state?.game_mode === 'cards' || state?.game_mode === 'judge_party';
        const promptText = state?.current_prompt || '';
        prompt.style.display = isCardsMode && promptText ? '' : 'none';
        const textNode = prompt.querySelector('.prompt-text');
        if (textNode) textNode.textContent = promptText || '';
      }

      function ensureTriviaQuestionPrompt(win, doc, state) {
        const submitPanel = doc.getElementById('submitPanel');
        const handList = doc.getElementById('handList');
        if (!submitPanel || !handList) return;
        let prompt = doc.getElementById('triviaQuestionPrompt');
        if (!prompt) {
          prompt = doc.createElement('div');
          prompt.id = 'triviaQuestionPrompt';
          prompt.innerHTML = '<div class="q-row"><div class="q-badge">Q:</div><div class="q-body"><div class="q-text"></div><div class="q-timer-row"><span class="q-timer-label">Timer</span><span class="q-timer-badge" id="triviaQuestionTimerBadge">No timer</span><span class="q-timer-note" id="triviaQuestionTimerNote">Timer starts when the trivia round begins</span></div></div></div>';
          submitPanel.insertBefore(prompt, handList);
        }
        const isTrivia = state?.game_mode === 'trivia';
        const questionText = state?.trivia?.current_question?.question || state?.current_prompt || '';
        prompt.style.display = isTrivia ? '' : 'none';
        const textNode = prompt.querySelector('.q-text');
        if (textNode) textNode.textContent = questionText || 'Waiting for the next trivia question…';
        renderQuestionTimer(win, doc, state);
      }

      function enhanceHandCards(win, doc, state) {
        const handList = doc.getElementById('handList');
        if (!handList) return;
        const isCardsMode = state?.game_mode === 'cards' || state?.game_mode === 'judge_party';
        handList.classList.toggle('enhanced-card-hand', isCardsMode);
        const cards = Array.from(handList.children || []);
        cards.forEach((card, index) => {
          if (!(card instanceof HTMLElement)) return;
          if (!isCardsMode) {
            card.classList.remove('enhanced-hand-card');
            const brand = card.querySelector('.card-brand'); if (brand) brand.remove();
            const idx = card.querySelector('.card-index'); if (idx) idx.remove();
            const text = card.querySelector('.card-text');
            if (text) card.textContent = text.textContent || '';
            return;
          }
          const selected = card.classList.contains('selected') || card.getAttribute('aria-pressed') === 'true';
          const originalText = (card.dataset.cardText || card.textContent || '').trim();
          card.dataset.cardText = originalText;
          card.classList.add('enhanced-hand-card');
          card.classList.toggle('selected', selected);
          card.innerHTML = `<div class="card-brand">Card Games</div><div class="card-index">${index + 1}</div><div class="card-text"></div>`;
          const textNode = card.querySelector('.card-text');
          if (textNode) textNode.textContent = originalText;
        });
      }

      function createSection(doc, hostControls, id, title, open) {
        let wrapper = doc.getElementById(id);
        if (!wrapper) {
          wrapper = doc.createElement('div');
          wrapper.className = 'host-section';
          wrapper.id = id;
          const details = doc.createElement('details');
          details.open = !!open;
          details.innerHTML = `<summary><span>${title}</span><span>${open ? 'Hide' : 'Show'}</span></summary><div class="section-body"></div>`;
          details.addEventListener('toggle', () => {
            const marker = details.querySelector('summary span:last-child');
            if (marker) marker.textContent = details.open ? 'Hide' : 'Show';
          });
          wrapper.appendChild(details);
          hostControls.appendChild(wrapper);
        }
        return wrapper.querySelector('.section-body');
      }

      function moveNodes(body, nodes) {
        nodes.filter(Boolean).forEach((node) => body.appendChild(node));
      }

      function markLegacyTriviaControls(doc) {
        [
          'triviaCategorySelect',
          'triviaTeamModeSelect',
          'triviaBuzzerModeSelect',
          'triviaBuzzBonusInput',
          'triviaStealEnabledSelect',
          'triviaCountInput',
          'triviaAgeRangeSelect',
          'triviaSourceSelect'
        ].forEach((id) => {
          const el = doc.getElementById(id);
          if (el) {
            el.classList.add('legacy-trivia-control');
            const label = doc.querySelector(`label[for="${id}"]`);
            if (label) label.classList.add('legacy-trivia-control');
          }
        });
      }

      function arrangeHostSections(win, doc, state) {
        const hostControls = doc.getElementById('hostControls');
        if (!hostControls) return;

        const roundsBody = createSection(doc, hostControls, 'hostSection-rounds', 'Game mode & rounds', true);
        const playersBody = createSection(doc, hostControls, 'hostSection-players', 'Players', true);
        const accessBody = createSection(doc, hostControls, 'hostSection-access', 'Room & host access', false);
        const advancedBody = createSection(doc, hostControls, 'hostSection-advanced', 'Trivia packs, AI, and imports', false);

        const modePanel = doc.getElementById('hostModePanel');
        const startActions = doc.getElementById('hostStartBtn')?.parentElement;
        const playersHeading = Array.from(hostControls.querySelectorAll('h3')).find((node) => node.textContent.trim() === 'Players');
        const playersList = doc.getElementById('playersList');
        const hostAccessBlock = doc.getElementById('hostUsersSelect')?.closest('.reveal-settings');
        const instanceManager = doc.getElementById('instanceManager');
        const deckImportGrid = doc.getElementById('deckImportModeSelect')?.closest('.control-grid');
        const deckImportActions = doc.getElementById('exportDecksBtn')?.closest('.actions');
        const aiTools = doc.getElementById('aiToolsMount');
        const manualEditor = doc.getElementById('manualEditorMount');
        if (deckImportGrid) deckImportGrid.classList.add('cards-only');
        if (deckImportActions) deckImportActions.classList.add('cards-only');

        moveNodes(roundsBody, [modePanel, startActions]);
        moveNodes(playersBody, [playersHeading, playersList]);
        moveNodes(accessBody, [hostAccessBlock, instanceManager]);
        moveNodes(advancedBody, [deckImportGrid, deckImportActions, aiTools, manualEditor]);

        const mode = state?.game_mode || 'cards';
        const triviaMode = mode === 'trivia';
        hostControls.classList.toggle('trivia-mode', triviaMode);
        hostControls.classList.toggle('cards-mode', mode === 'cards');
        hostControls.classList.toggle('judge-party-mode', mode === 'judge_party');

        const accessSection = doc.getElementById('hostSection-access');
        if (accessSection) accessSection.dataset.hidden = triviaMode ? 'true' : 'false';

        const advancedSection = doc.getElementById('hostSection-advanced');
        if (advancedSection) advancedSection.dataset.hidden = 'false';

        const playersSection = doc.getElementById('hostSection-players');
        if (playersSection) playersSection.dataset.hidden = 'false';
      }

      function setValue(doc, id, value) {
        const el = doc.getElementById(id);
        if (el == null || value == null) return;
        if (doc.activeElement === el) return;
        el.value = String(value);
      }


      function fillSelectOptions(select, items, valueKey = 'value', labelKey = 'label', includeBlank = false, blankLabel = 'Choose...') {
        if (!select) return;
        const current = select.value;
        const options = [];
        if (includeBlank) options.push(`<option value="">${blankLabel}</option>`);
        for (const item of items || []) {
          const value = String(item?.[valueKey] ?? '');
          const label = String(item?.[labelKey] ?? value);
          options.push(`<option value="${value}">${label}</option>`);
        }
        select.innerHTML = options.join('');
        if (current) select.value = current;
      }

      function fillMultiSelectOptions(select, items, selectedValues, valueKey = 'entity_id', labelKey = 'name') {
        if (!select) return;
        const selected = new Set((selectedValues || []).map((item) => String(item)));
        select.innerHTML = (items || []).map((item) => {
          const value = String(item?.[valueKey] ?? '');
          const label = String(item?.[labelKey] ?? value);
          return `<option value="${value}" ${selected.has(value) ? 'selected' : ''}>${label}</option>`;
        }).join('');
      }

      async function saveVoiceSettings(win, doc) {
        const speakerSelect = doc.getElementById('enhancedTtsTargetsSelect');
        const speakerTargets = Array.from(speakerSelect?.selectedOptions || []).map((option) => option.value).filter(Boolean);
        await win.hostAction('set_trivia_voice_config', {
          enabled: doc.getElementById('enhancedTtsEnabledSelect').value === 'true',

      async function importTriviaPackFromPayload(win, doc, payload) {
        if (!payload || typeof payload !== 'object') {
          throw new Error('Trivia import payload must be a JSON object');
        }
        const slug = String(payload.slug || payload.name || '').trim();
        const name = String(payload.name || payload.slug || '').trim();
        const description = String(payload.description || '').trim();
        const questions = Array.isArray(payload.questions) ? payload.questions : [];

        if (!name) throw new Error('Trivia pack name is required');
        if (!questions.length) throw new Error('Trivia pack must contain at least one question');

        await win.hostAction('import_trivia_pack', {
          slug,
          name,
          description,
          questions,
        });
      }

      async function readJsonFile(file) {
        const raw = await file.text();
        return JSON.parse(raw);
      }

      function enhanceUi(win, doc, state) {
        if (!state) return;
        ensurePromptCard(win, doc, state);
        ensureTriviaQuestionPrompt(win, doc, state);
        enhanceHandCards(win, doc, state);
        ensureHostModePanel(win, doc, state);
        arrangeHostSections(win, doc, state);
      }

      frame.addEventListener('load', () => {
        let attempts = 0;
        const timer = setInterval(() => {
          attempts += 1;
          if (tryEnhanceLegacy() || attempts > 80) clearInterval(timer);
        }, 250);

        let timerLoop = null;
        let syncLoop = null;
        const startTimerLoop = () => {
          if (timerLoop) clearInterval(timerLoop);
          timerLoop = setInterval(() => {
            try {
              const win = frame.contentWindow;
              const doc = frame.contentDocument;
              if (win?.latestState && doc) {
                renderQuestionTimer(win, doc, win.latestState);
                enhanceHandCards(win, doc, win.latestState);
              }
            } catch (_err) {}
          }, 250);
        };
        const startSyncLoop = () => {
          if (syncLoop) clearInterval(syncLoop);
          syncLoop = setInterval(() => {
            try {
              const win = frame.contentWindow;
              const doc = frame.contentDocument;
              if (shouldSkipSync(doc)) return;
              if (typeof win?.fetchState === 'function') {
                win.fetchState().catch(() => {});
              }
            } catch (_err) {}
          }, 1000);
        };
        startTimerLoop();
        startSyncLoop();
      });
