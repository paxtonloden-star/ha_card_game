<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HA Card Game</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b1020; }
      iframe { border: 0; width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <iframe id="legacyFrame" title="HA Card Game" referrerpolicy="same-origin"></iframe>
    <script>
      const frame = document.getElementById('legacyFrame');
      const target = new URL('/local/ha_card_game/index.html', window.location.origin);
      target.search = window.location.search;
      target.hash = window.location.hash;
      frame.src = target.toString();
    </script>
  </body>
</html>
