<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HA Card Game</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b1020; }
      iframe { border: 0; width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <iframe id="legacyFrame" title="HA Card Game" referrerpolicy="same-origin"></iframe>
    <script>
      const frame = document.getElementById('legacyFrame');
      const target = new URL('/local/ha_card_game/index.html', window.location.origin);
      target.search = window.location.search;
      target.hash = window.location.hash;
      frame.src = target.toString();

      function tryEnhanceLegacy() {
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        if (!win || !doc || !doc.body) return false;
        if (win.__cardGamesWrapperEnhancementsApplied) {
          if (win.latestState) {
            try { enhanceUi(win, doc, win.latestState); } catch (_err) {}
          }
          return true;
        }
        if (typeof win.render !== 'function' || typeof win.hostAction !== 'function') return false;

        win.__cardGamesWrapperEnhancementsApplied = true;

        const style = doc.createElement('style');
        style.textContent = `
          #triviaQuestionPrompt, #playerPromptCard {
            margin-bottom: 12px;
            padding: 16px 18px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            isolation: isolate;
          }
          #triviaQuestionPrompt {
            background: rgba(124,156,255,.10);
            border: 1px solid rgba(124,156,255,.24);
          }
          #playerPromptCard {
            background: #111;
            color: #fff;
            border: 1px solid rgba(255,255,255,.18);
            box-shadow: 0 18px 36px rgba(0,0,0,.28);
          }
          #playerPromptCard::before,
          #triviaQuestionPrompt::before,
          .enhanced-hand-card::before {
            content: 'CARD GAMES';
            position: absolute;
            inset: auto 10px 8px auto;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: .14em;
            opacity: .06;
            pointer-events: none;
            white-space: nowrap;
            transform: rotate(-18deg);
            z-index: -1;
          }
          #playerPromptCard::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,.05), transparent 28%);
            pointer-events: none;
          }
          #playerPromptCard .prompt-label,
          #triviaQuestionPrompt .q-badge {
            flex: 0 0 auto;
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
          }
          #playerPromptCard .prompt-label { color: rgba(255,255,255,.86); }
          #playerPromptCard .prompt-row,
          #triviaQuestionPrompt .q-row { display: flex; gap: 12px; align-items: flex-start; }
          #playerPromptCard .prompt-body,
          #triviaQuestionPrompt .q-body { min-width: 0; flex: 1 1 auto; }
          #playerPromptCard .prompt-text,
          #triviaQuestionPrompt .q-text {
            font-size: 19px;
            font-weight: 800;
            line-height: 1.36;
          }
          #playerPromptCard .prompt-meta {
            margin-top: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .1em;
            opacity: .7;
            font-weight: 800;
          }
          #triviaQuestionPrompt .q-badge { color: #9bb6ff; }
          #triviaQuestionPrompt .q-timer-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
          #triviaQuestionPrompt .q-timer-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; opacity: .7; }
          #triviaQuestionPrompt .q-timer-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 70px; padding: 6px 10px; border-radius: 999px; font-weight: 800; background: rgba(124,156,255,.18); border: 1px solid rgba(124,156,255,.25); }
          #triviaQuestionPrompt .q-timer-badge.warning { background: rgba(245,158,11,.18); border-color: rgba(245,158,11,.35); color: #ffd089; }
          #triviaQuestionPrompt .q-timer-badge.danger { background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.35); color: #ffb0b0; }
          #triviaQuestionPrompt .q-timer-note { font-size: 12px; opacity: .72; }
          #handList.enhanced-card-hand {
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            align-items: stretch;
          }
          .enhanced-hand-card {
            position: relative;
            display: flex;
            min-height: 220px;
            padding: 16px;
            border-radius: 18px;
            background: #fff;
            color: #111;
            border: 1px solid rgba(0,0,0,.12);
            box-shadow: 0 12px 28px rgba(0,0,0,.18);
            overflow: hidden;
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
          }
          .enhanced-hand-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(0,0,0,.22);
          }
          .enhanced-hand-card.selected {
            border-color: rgba(67, 97, 238, .65);
            box-shadow: 0 0 0 3px rgba(67,97,238,.12), 0 18px 34px rgba(0,0,0,.22);
          }
          .enhanced-hand-card .card-index {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 26px;
            height: 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            background: rgba(17,17,17,.08);
          }
          .enhanced-hand-card .card-text {
            margin-top: auto;
            white-space: normal;
            font-size: 20px;
            line-height: 1.28;
            font-weight: 700;
          }
          .enhanced-hand-card .card-brand {
            position: absolute;
            left: 14px;
            top: 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .12em;
            opacity: .72;
            font-weight: 800;
          }
          #hostModePanel.card { margin-bottom: 16px; border: 1px solid rgba(124,156,255,.24); background: rgba(124,156,255,.08); }
          #hostModePanel .control-grid { margin-bottom: 12px; }
          .host-section details { border: 1px solid rgba(255,255,255,.08); border-radius: 14px; background: rgba(10,16,32,.45); margin-top: 12px; overflow: hidden; }
          .host-section summary { cursor: pointer; list-style: none; padding: 14px 16px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
          .host-section summary::-webkit-details-marker { display: none; }
          .host-section .section-body { padding: 0 16px 16px; }
          .host-section[data-hidden="true"] { display: none !important; }
          #hostModePanel[data-mode="trivia"] .cards-only { display: none !important; }
          #hostModePanel[data-mode="cards"] .trivia-only, #hostModePanel[data-mode="judge_party"] .trivia-only { display: none !important; }
          #aiToolsMount .legacy-trivia-hide, #aiToolsMount .legacy-trivia-hide + div, #aiToolsMount .legacy-trivia-hide + input, #aiToolsMount .legacy-trivia-hide + select { display:none !important; }
          #hostControls.trivia-mode #deckSelect, #hostControls.trivia-mode #deckDescription, #hostControls.trivia-mode #selectedDeckMode { display:none !important; }
          #enhancedTriviaCategorySelect { min-height: 140px; }
          #hostModePanel .pill-note { font-size: 12px; opacity: .75; }
        `;
        doc.head.appendChild(style);

        const originalRender = win.render.bind(win);
        win.render = function(state) {
          const result = originalRender(state);
          setTimeout(() => { try { enhanceUi(win, doc, state); } catch (err) { console.error(err); } }, 0);
          return result;
        };

        const originalBootstrapHost = typeof win.bootstrapHost === 'function' ? win.bootstrapHost.bind(win) : null;
        if (originalBootstrapHost) {
          win.bootstrapHost = async function(...args) {
            const result = await originalBootstrapHost(...args);
            setTimeout(() => { try { enhanceUi(win, doc, win.latestState || null); } catch (err) { console.error(err); } }, 0);
            return result;
          };
        }

        if (win.latestState) {
          try { enhanceUi(win, doc, win.latestState); } catch (_err) {}
        }
        return true;
      }

      function getTriviaCategoryOptions(win, doc) {
        const map = new Map();
        const select = doc.getElementById('triviaCategorySelect');
        if (select) {
          Array.from(select.options || []).forEach((option) => {
            const value = String(option.value || '').trim();
            if (value) map.set(value, option.textContent || value);
          });
        }
        const customPacks = win.latestState?.trivia?.custom_packs || [];
        customPacks.forEach((pack) => {
          const value = String(pack.slug || '').trim();
          if (value) map.set(value, pack.name || value);
        });
        return Array.from(map.entries()).map(([value, label]) => ({ value, label }));
      }

      function formatTimerValue(totalSeconds, endsAt) {
        if (!totalSeconds || !endsAt) return 'No timer';
        const remaining = Math.max(0, Math.ceil(endsAt - Date.now() / 1000));
        const minutes = Math.floor(remaining / 60);
        const seconds = String(remaining % 60).padStart(2, '0');
        return `${minutes}:${seconds}`;
      }

      function renderQuestionTimer(win, doc, state) {
        const badge = doc.getElementById('triviaQuestionTimerBadge');
        const note = doc.getElementById('triviaQuestionTimerNote');
        if (!badge || !note) return;
        const isTrivia = state?.game_mode === 'trivia';
        const totalSeconds = Number(state?.round_timer_duration || state?.trivia?.answer_seconds || 0);
        const endsAt = Number(state?.round_timer_ends_at || 0);
        badge.style.display = isTrivia ? 'inline-flex' : 'none';
        note.style.display = isTrivia ? '' : 'none';
        if (!isTrivia) return;
        badge.textContent = formatTimerValue(totalSeconds, endsAt);
        const remaining = endsAt ? Math.max(0, Math.ceil(endsAt - Date.now() / 1000)) : 0;
        badge.classList.toggle('warning', remaining <= 15 && remaining > 5);
        badge.classList.toggle('danger', remaining <= 5 && remaining >= 0);
        if (state?.state === 'results') {
          const revealSeconds = Number(state?.trivia?.reveal_seconds || 5);
          note.textContent = `Answer shown now${revealSeconds > 0 ? ` µ next question after about ${revealSeconds}s` : ''}`;
        } else if (totalSeconds && endsAt) {
          note.textContent = 'Time remaining to answer';
        } else {
          note.textContent = 'Timer starts when the trivia round begins';
        }
      }

      function ensurePromptCard(win, doc, state) {
        const submitPanel = doc.getElementById('submitPanel');
        const handList = doc.getElementById('handList');
        if (!submitPanel || !handList) return;
        let prompt = doc.getElementById('playerPromptCard');
        if (!prompt) {
          prompt = doc.createElement('div');
          prompt.id = 'playerPromptCard';
          prompt.innerHTML = '<div class="prompt-row"><div class="prompt-label">Q</div><div class="prompt-body"><div class="prompt-text"></div><div class="prompt-meta">Black card</div></div></div>';
          submitPanel.insertBefore(prompt, handList);
        }
        const isCardsMode = state?.game_mode === 'cards' || state?.game_mode === 'judge_party';
        const promptText = state?.current_prompt || '';
        prompt.style.display = isCardsMode && promptText ? '' : 'none';
        const textNode = prompt.querySelector('.prompt-text');
        if (textNode) textNode.textContent = promptText || '';
      }

      function ensureTriviaQuestionPrompt(win, doc, state) {
        const submitPanel = doc.getElementById('submitPanel');
        const handList = doc.getElementById('handList');
        if (!submitPanel || !handList) return;
        let prompt = doc.getElementById('triviaQuestionPrompt');
        if (!prompt) {
          prompt = doc.createElement('div');
          prompt.id = 'triviaQuestionPrompt';
          prompt.innerHTML = '<div class="q-row"><div class="q-badge">Q:</div><div class="q-body"><div class="q-text"></div><div class="q-timer-row"><span class="q-timer-label">Timer</span><span class="q-timer-badge" id="triviaQuestionTimerBadge">No timer</span><span class="q-timer-note" id="triviaQuestionTimerNote">Timer starts when the trivia round begins</span></div></div></div>';
          submitPanel.insertBefore(prompt, handList);
        }
        const isTrivia = state?.game_mode === 'trivia';
        const questionText = state?.trivia?.current_question?.question || state?.current_prompt || '';
        prompt.style.display = isTrivia ? '' : 'none';
        const textNode = prompt.querySelector('.q-text');
        if (textNode) textNode.textContent = questionText || 'Waiting for the next trivia question…';
        renderQuestionTimer(win, doc, state);
      }

      function enhanceHandCards(win, doc, state) {
        const handList = doc.getElementById('handList');
        if (!handList) return;
        const isCardsMode = state?.game_mode === 'cards' || state?.game_mode === 'judge_party';
        handList.classList.toggle('enhanced-card-hand', isCardsMode);
        const cards = Array.from(handList.children || []);
        cards.forEach((card, index) => {
          if (!(card instanceof HTMLElement)) return;
          if (!isCardsMode) {
            card.classList.remove('enhanced-hand-card');
            const brand = card.querySelector('.card-brand'); if (brand) brand.remove();
            const idx = card.querySelector('.card-index'); if (idx) idx.remove();
            const text = card.querySelector('.card-text');
            if (text) {
              card.textContent = text.textContent || '';
            }
            return;
          }
          const selected = card.classList.contains('selected') || card.getAttribute('aria-pressed') === 'true';
          const originalText = (card.dataset.cardText || card.textContent || '').trim();
          card.dataset.cardText = originalText;
          card.classList.add('enhanced-hand-card');
          card.classList.toggle('selected', selected);
          card.innerHTML = `<div class="card-brand">Card Games</div><div class="card-index">${index + 1}</div><div class="card-text"></div>`;
          const textNode = card.querySelector('.card-text');
          if (textNode) textNode.textContent = originalText;
        });
      }

      function createSection(doc, hostControls, id, title, open) {
        let wrapper = doc.getElementById(id);
        if (!wrapper) {
          wrapper = doc.createElement('div');
          wrapper.className = 'host-section';
          wrapper.id = id;
          const details = doc.createElement('details');
          details.open = !!open;
          details.innerHTML = `<summary><span>${title}</span><span>${open ? 'Hide' : 'Show'}</span></summary><div class="section-body"></div>`;
          details.addEventListener('toggle', () => {
            const marker = details.querySelector('summary span:last-child');
            if (marker) marker.textContent = details.open ? 'Hide' : 'Show';
          });
          wrapper.appendChild(details);
          hostControls.appendChild(wrapper);
        }
        return wrapper.querySelector('.section-body');
      }

      function moveNodes(body, nodes) {
        nodes.filter(Boolean).forEach((node) => body.appendChild(node));
      }

      function arrangeHostSections(win, doc, state) {
        const hostControls = doc.getElementById('hostControls');
        if (!hostControls) return;
        const roundsBody = createSection(doc, hostControls, 'hostSection-rounds', 'Game mode & rounds', true);
        const accessBody = createSection(doc, hostControls, 'hostSection-access', 'Room & host access', false);
        const revealBody = createSection(doc, hostControls, 'hostSection-reveal', 'Reveal system', false);
        const playersBody = createSection(doc, hostControls, 'hostSection-players', 'Players', true);
        const advancedBody = createSection(doc, hostControls, 'hostSection-advanced', 'Trivia, AI, and remote tools', false);
        const manualBody = createSection(doc, hostControls, 'hostSection-manual', 'Profiles & custom categories', false);
        const modePanel = doc.getElementById('hostModePanel');
        const timerBlock = doc.querySelector('.timer-block');
        const startActions = doc.getElementById('hostStartBtn')?.parentElement;
        const hostAccessBlock = doc.getElementById('hostUsersSelect')?.closest('.reveal-settings');
        const instanceManager = doc.getElementById('instanceManager');
        const deckImportGrid = doc.getElementById('deckImportModeSelect')?.closest('.control-grid');
        const deckImportActions = doc.getElementById('exportDecksBtn')?.closest('.actions');
        const revealSettings = doc.getElementById('revealDurationInput')?.closest('.reveal-settings');
        const playersHeading = Array.from(hostControls.querySelectorAll('h3')).find((node) => node.textContent.trim() === 'Players');
        const playersList = doc.getElementById('playersList');
        const aiTools = doc.getElementById('aiToolsMount');
        const manualEditor = doc.getElementById('manualEditorMount');
        moveNodes(roundsBody, [modePanel, timerBlock, startActions]);
        moveNodes(accessBody, [hostAccessBlock, instanceManager, deckImportGrid, deckImportActions]);
        moveNodes(revealBody, [revealSettings]);
        moveNodes(playersBody, [playersHeading, playersList]);
        moveNodes(advancedBody, [aiTools]);
        moveNodes(manualBody, [manualEditor]);
        const triviaMode = state?.game_mode === 'trivia';
        hostControls.classList.toggle('trivia-mode', triviaMode);
        const accessSection = doc.getElementById('hostSection-access');
        if (accessSection) accessSection.dataset.hidden = triviaMode ? 'true' : 'false';
      }

      function ensureHostModePanel(win, doc, state) {
        const hostControls = doc.getElementById('hostControls');
        if (!hostControls) return;
        let panel = doc.getElementById('hostModePanel');
        if (!panel) {
          panel = doc.createElement('div');
          panel.id = 'hostModePanel';
          panel.className = 'card';
          panel.innerHTML = `
            <h3 style="margin-top:0;">Game mode</h3>
            <div class="control-grid">
              <div>
                <label class="label" for="enhancedGameModeSelect">Mode</label>
                <select id="enhancedGameModeSelect">
                  <option value="trivia">Trivia</option>
                  <option value="cards">Cards Against Us</option>
                  <option value="judge_party">Kids Cards Against Us</option>
                </select>
              </div>
              <div class="trivia-only">
                <label class="label" for="enhancedTriviaCategorySelect">Trivia categories</label>
                <select id="enhancedTriviaCategorySelect" multiple></select>
                <div class="pill-note">Hold Ctrl/Cmd to choose more than one category. Custom packs also appear here.</div>
              </div>
              <div class="trivia-only">
                <label class="label" for="enhancedAnswerSecondsInput">Answer seconds</label>
                <input id="enhancedAnswerSecondsInput" type="number" min="3" max="120" step="1" value="15" />
              </div>
              <div class="trivia-only">
                <label class="label" for="enhancedRevealSecondsInput">Reveal seconds</label>
                <input id="enhancedRevealSecondsInput" type="number" min="1" max="60" step="1" value="5" />
              </div>
              <div class="trivia-only">
                <label class="label" for="enhancedAutoCycleSelect">Auto next question</label>
                <select id="enhancedAutoCycleSelect"><option value="true">On</option><option value="false">Off</option></select>
              </div>
              <div class="trivia-only">
                <label class="label" for="enhancedTriviaSourceSelect">Source</label>
                <select id="enhancedTriviaSourceSelect"><option value="offline_curated">Offline curated</option><option value="ai">AI</option></select>
              </div>
            </div>
            <div class="actions wrap">
              <button id="enhancedApplyModeBtn">Apply mode</button>
              <button class="secondary trivia-only" id="enhancedPrepareTriviaBtn">Prepare trivia</button>
              <button class="secondary trivia-only" id="enhancedStartTriviaBtn">Start trivia</button>
              <button class="secondary trivia-only" id="enhancedNewCategoryBtn">New custom category</button>
            </div>
          `;
          hostControls.insertBefore(panel, hostControls.firstChild);
          doc.getElementById('enhancedApplyModeBtn').addEventListener('click', async () => {
            try {
              const mode = doc.getElementById('enhancedGameModeSelect').value;
              await win.hostAction('set_game_mode', { game_mode: mode });
              win.setNotice('hostNotice', 'Game mode updated.', 'success');
            } catch (err) {
              win.setNotice('hostNotice', err.message, 'warning');
            }
          });
          doc.getElementById('enhancedPrepareTriviaBtn').addEventListener('click', async () => {
            try {
              const categorySelect = doc.getElementById('enhancedTriviaCategorySelect');
              const categories = Array.from(categorySelect.selectedOptions || []).map((option) => option.value).filter(Boolean);
              const ageRange = doc.getElementById('triviaAgeRangeSelect')?.value || '18_plus';
              const questionCount = parseInt(doc.getElementById('triviaCountInput')?.value || '10', 10);
              const answerSeconds = parseInt(doc.getElementById('enhancedAnswerSecondsInput').value || '15', 10);
              const revealSeconds = parseInt(doc.getElementById('enhancedRevealSecondsInput').value || '5', 10);
              const autoCycleEnabled = doc.getElementById('enhancedAutoCycleSelect').value === 'true';
              const source = doc.getElementById('enhancedTriviaSourceSelect').value || 'offline_curated';
              await win.hostAction('set_game_mode', { game_mode: 'trivia' });
              await win.hostAction('set_trivia_settings', {
                team_mode: doc.getElementById('triviaTeamModeSelect')?.value === 'true',
                buzzer_mode: doc.getElementById('triviaBuzzerModeSelect')?.value === 'true',
                buzz_bonus: parseInt(doc.getElementById('triviaBuzzBonusInput')?.value || '1', 10),
                steal_enabled: doc.getElementById('triviaStealEnabledSelect')?.value === 'true',
                answer_seconds: answerSeconds,
                reveal_seconds: revealSeconds,
                auto_cycle_enabled: autoCycleEnabled
              });
              await win.hostAction('prepare_trivia', {
                categories,
                category: categories[0] || 'fun_facts',
                age_range: ageRange,
                question_count: questionCount,
                source
              });
              win.setNotice('hostExtraNotice', `Prepared trivia from ${categories.length || 1} categor${categories.length === 1 ? 'y' : 'ies'}.`, 'success');
            } catch (err) {
              win.setNotice('hostExtraNotice', err.message, 'warning');
            }
          });
          doc.getElementById('enhancedStartTriviaBtn').addEventListener('click', async () => {
            try {
              await win.hostAction('set_game_mode', { game_mode: 'trivia' });
              await win.hostAction('start_trivia_round');
              win.setNotice('hostExtraNotice', 'Trivia round started.', 'success');
            } catch (err) {
              win.setNotice('hostExtraNotice', err.message, 'warning');
            }
          });
          doc.getElementById('enhancedNewCategoryBtn').addEventListener('click', () => {
            const select = doc.getElementById('customTriviaPackSelect');
            const nameInput = doc.getElementById('customTriviaPackNameInput');
            if (select) select.value = '';
            if (nameInput) nameInput.focus();
            const manual = doc.getElementById('manualEditorMount');
            if (manual) manual.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        }
        const mode = state?.game_mode || 'cards';
        panel.dataset.mode = mode;
        const modeSelect = doc.getElementById('enhancedGameModeSelect');
        if (modeSelect) modeSelect.value = mode;
        const answerSeconds = state?.trivia?.answer_seconds || state?.round_timer_duration || 15;
        const revealSeconds = state?.trivia?.reveal_seconds || 5;
        const autoCycle = String(state?.trivia?.auto_cycle_enabled !== false);
        if (doc.getElementById('enhancedAnswerSecondsInput')) doc.getElementById('enhancedAnswerSecondsInput').value = answerSeconds;
        if (doc.getElementById('enhancedRevealSecondsInput')) doc.getElementById('enhancedRevealSecondsInput').value = revealSeconds;
        if (doc.getElementById('enhancedAutoCycleSelect')) doc.getElementById('enhancedAutoCycleSelect').value = autoCycle;
        if (doc.getElementById('enhancedTriviaSourceSelect')) doc.getElementById('enhancedTriviaSourceSelect').value = state?.trivia?.source || 'offline_curated';
        const categorySelect = doc.getElementById('enhancedTriviaCategorySelect');
        if (categorySelect) {
          const options = getTriviaCategoryOptions(win, doc);
          const remembered = JSON.parse(win.localStorage.getItem('ha_card_game_selected_categories') || '[]');
          const selectedSet = new Set(remembered.length ? remembered : [state?.trivia?.category].filter(Boolean));
          categorySelect.innerHTML = options.map((item) => `<option value="${item.value}" ${selectedSet.has(item.value) ? 'selected' : ''}>${item.label}</option>`).join('');
          categorySelect.onchange = () => {
            const selected = Array.from(categorySelect.selectedOptions || []).map((option) => option.value);
            win.localStorage.setItem('ha_card_game_selected_categories', JSON.stringify(selected));
          };
        }
        const oldCategorySelect = doc.getElementById('triviaCategorySelect');
        if (oldCategorySelect) oldCategorySelect.classList.add('legacy-trivia-hide');
        const oldCategoryLabel = doc.querySelector('label[for="triviaCategorySelect"]');
        if (oldCategoryLabel) oldCategoryLabel.classList.add('legacy-trivia-hide');
      }

      function enhanceUi(win, doc, state) {
        if (!state) return;
        ensurePromptCard(win, doc, state);
        ensureTriviaQuestionPrompt(win, doc, state);
        enhanceHandCards(win, doc, state);
        ensureHostModePanel(win, doc, state);
        arrangeHostSections(win, doc, state);
      }

      frame.addEventListener('load', () => {
        let attempts = 0;
        const timer = setInterval(() => {
          attempts += 1;
          if (tryEnhanceLegacy() || attempts > 80) clearInterval(timer);
        }, 250);
        let timerLoop = null;
        const startTimerLoop = () => {
          if (timerLoop) clearInterval(timerLoop);
          timerLoop = setInterval(() => {
            try {
              const win = frame.contentWindow;
              const doc = frame.contentDocument;
              if (win?.latestState && doc) {
                renderQuestionTimer(win, doc, win.latestState);
                enhanceHandCards(win, doc, win.latestState);
              }
            } catch (_err) {}
          }, 1000);
        };
        startTimerLoop();
      });
    </script>
  </body>
